<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#120f25">
    <title>Ledger Legends Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="game-screen">
    <canvas id="gameCanvas" aria-label="Ledger Legends game world" tabindex="0"></canvas>
    <div id="playerDialogueBubble" class="player-dialogue-bubble" aria-live="polite" aria-atomic="true" aria-hidden="true">
        <img class="player-dialogue-bubble-image" src="assets/dialogue bubble.png" alt="">
        <span id="playerDialogueText" class="player-dialogue-text"></span>
    </div>
    <section id="mobileControls" class="mobile-controls" aria-label="Touch controls">
        <div class="mobile-move-cluster">
            <button id="touchLeftButton" class="touch-button" type="button" aria-label="Move left">LEFT</button>
            <button id="touchRightButton" class="touch-button" type="button" aria-label="Move right">RIGHT</button>
        </div>
        <button id="touchJumpButton" class="touch-button touch-button-jump" type="button" aria-label="Jump">JUMP</button>
    </section>

    <section class="hud" aria-live="polite">
        <div class="hud-line">
            <span id="hudPrimaryText" class="hud-primary-text">Questions: 0 | Shield: None</span>
            <span id="hudSecondaryText" class="hud-secondary-text">Score: 0 | Distance: 0 m | Coins: 0</span>
        </div>
    </section>

    <section id="devToolbar" class="dev-toolbar hidden" aria-label="Developer controls">
        <div class="dev-toolbar-line">
            <span id="devToolbarLabel" class="dev-pill">Developer Mode</span>
        </div>
        <div class="dev-toolbar-line">
            <button id="devSkipButton" class="dev-button" type="button">Skip Questions</button>
            <button id="devAutoButton" class="dev-button" type="button">Auto Correct</button>
            <button id="devFreezeButton" class="dev-button" type="button">Freeze Lava</button>
        </div>
        <div class="dev-toolbar-line">
            <button id="devLevelDownButton" class="dev-button" type="button">Prev Level</button>
            <button id="devLevelClearButton" class="dev-button" type="button">Auto Level</button>
            <button id="devLevelUpButton" class="dev-button" type="button">Next Level</button>
        </div>
        <div class="dev-toolbar-line">
            <button id="devDistanceDownButton" class="dev-button" type="button">-1000m</button>
            <button id="devDistanceUpButton" class="dev-button" type="button">+1000m</button>
        </div>
    </section>

    <section id="cornerControls" class="corner-controls hidden" aria-label="Game controls">
        <button id="pauseToggleButton" class="corner-button" type="button" aria-label="Pause game">Pause</button>
        <button id="soundToggleButton" class="corner-button" type="button" aria-label="Toggle sound" aria-pressed="false">Sound</button>
    </section>

    <section id="pauseOverlay" class="game-overlay hidden">
        <div class="overlay-card compact-card pause-card scroll-surface">
            <div class="pause-scroll-content">
                <h2>Paused</h2>
                <div class="overlay-actions pause-actions">
                    <button id="resumeRunButton" class="primary-button" type="button">Resume</button>
                    <button id="restartRunButton" class="secondary-button" type="button">Restart Run</button>
                    <a id="quitRunButton" class="secondary-link pause-quit-link" href="index.html">Quit</a>
                </div>
            </div>
        </div>
    </section>

    <section id="summaryOverlay" class="game-overlay hidden">
        <div class="overlay-card scoreboard-card scoreboard-summary-card">
            <div class="scoreboard-summary-top">
                <div class="scoreboard-hero">
                    <img class="gameover-image summary-gameover-image" src="assets/gameover.png" alt="Game Over">
                    <div class="scoreboard-title-block">
                        <p class="overlay-kicker">High Scores</p>
                        <h2>Arcade Scoreboard</h2>
                    </div>
                </div>
                <div class="scoreboard-current">
                    <p><strong>Distance:</strong> <span id="summaryDistance">0 m</span></p>
                    <p><strong>Coins:</strong> <span id="summaryCoins">0</span></p>
                    <p><strong>Questions:</strong> <span id="summaryQuestions">0</span></p>
                    <p><strong>Shield Saves:</strong> <span id="summaryShieldSaves">0</span></p>
                </div>
            </div>
            <div class="initials-row">
                <label for="summaryInitials">Initials</label>
                <input id="summaryInitials" type="text" maxlength="3" autocomplete="off" placeholder="???">
                <button id="summarySaveButton" class="secondary-button" type="button">Save Score</button>
            </div>
            <div class="scoreboard-table-wrap">
                <table class="scoreboard-table">
                    <thead>
                        <tr>
                            <th>Initials</th>
                            <th>Distance</th>
                            <th>Questions</th>
                            <th>Coins</th>
                        </tr>
                    </thead>
                    <tbody id="scoreboardBody"></tbody>
                </table>
            </div>
            <div class="overlay-actions scoreboard-actions">
                <button id="summaryRestartButton" class="primary-button" type="button">Play Again</button>
                <a id="summaryQuitLink" class="secondary-link" href="index.html">Back to Menu</a>
            </div>
        </div>
    </section>

    <section id="questionBox" class="question-box hidden" aria-live="assertive" aria-modal="true" role="dialog">
        <div class="question-scroll-content">
            <div class="question-paper-panel">
                <p class="question-kicker">Accounting Challenge</p>
                <h2 id="questionText">Question</h2>
                <div id="options" class="question-options"></div>
                <p id="feedback" class="feedback"></p>
            </div>
        </div>
    </section>

    <script src="player.js"></script>
    <script src="platforms.js"></script>
    <script src="questions.js"></script>
    <script src="gameLoop.js"></script>
    <script src="main.js"></script>
</body>
</html>
