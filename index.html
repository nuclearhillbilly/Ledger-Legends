<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d0b10">
    <title>Ledger Legends</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="menu">
    <div class="menu-background" aria-hidden="true"></div>
    <div class="menu-bird-sky" aria-hidden="true">
        <img class="menu-bird menu-bird-one" src="assets/birdsprite_wingsup.png" alt="">
        <img class="menu-bird menu-bird-two" src="assets/birdsprite_wingsup.png" alt="">
        <img class="menu-bird menu-bird-three" src="assets/birdsprite_wingsup.png" alt="">
    </div>

    <main class="menu-screen">
        <section class="menu-stack" aria-labelledby="menuTitle">
            <h1 id="menuTitle" class="sr-only">Ledger Legends</h1>
            <div class="menu-title-wrap" aria-hidden="true">
                <img class="menu-title-image" src="assets/UI_title.png" alt="">
            </div>

            <nav class="menu-list" aria-label="Main menu">
                <button id="startGameButton" class="menu-action" type="button">Start Game</button>
                <button id="howToPlayButton" class="menu-action" type="button">How to Play</button>
                <label class="menu-toggle-row" for="devModeToggle">
                    <span class="menu-action-label">Enable Developer Mode</span>
                    <span class="menu-toggle-control">
                        <input id="devModeToggle" type="checkbox">
                        <span class="menu-toggle-box" aria-hidden="true"></span>
                    </span>
                </label>
            </nav>
        </section>
    </main>

    <div class="menu-runner-lane" aria-hidden="true">
        <div id="menuRunnerBubble" class="menu-runner-bubble">
            <img class="menu-runner-bubble-image" src="assets/dialogue bubble.png" alt="">
            <span id="menuRunnerBubbleText" class="menu-runner-bubble-text">Easy jump!</span>
        </div>
        <img id="menuMonster" class="menu-monster-sprite" src="assets/monster-lava.png" alt="">
        <img id="menuRunner" class="menu-runner-sprite" src="assets/player_run.png" alt="">
    </div>

    <script>
    const SETTINGS_STORAGE_KEY = "ledger-legends-settings";
    const MENU_DIALOGUE_LINES = [
        "Easy jump!",
        "Stay focused!",
        "One step at a time.",
        "Don't mess this up...",
        "I'm flying now!",
        "Too fast, too clean!",
        "Lock in, let's go!",
        "No mistakes!",
        "That was close!",
        "Keep it moving!",
        "I'm not falling today!",
        "Perfect timing!",
        "Let's go again!",
        "I won't choke this run!",
        "Clean run, clean run!",
        "Alright, here we go!",
        "Just a little further!",
        "I can do this all day!",
        "Finish strong!",
        "Alright... time to pass this test.",
        "Did I study enough for this?",
        "I definitely should've reviewed more...",
        "Debit on the left... right?",
        "Stay calm, I know this stuff.",
        "Balance the sheet, balance the run.",
        "No mistakes... no mistakes...",
        "I can't fail this class.",
        "Think... what did the professor say?",
        "Assets equal liabilities... plus equity!",
        "Okay, I remember this one!",
        "Don't panic, just keep moving.",
        "I need this grade.",
        "Alright, focus up!",
        "This is just like practice... I think.",
        "Please let this be on the test.",
        "I'm actually getting this!",
        "Wait... that didn't look right.",
        "One question at a time.",
        "I'm passing this. No matter what."
    ];
    const HOW_TO_PLAY_MESSAGE = [
        "Desktop: Arrow keys or A/D move.",
        "Jump: Space, Up, or W.",
        "Mobile: Hold left or right side to move and tap to jump.",
        "Falling in lava triggers an accounting challenge."
    ].join("\n");

    function readGameSettings() {
        try {
            return JSON.parse(window.localStorage.getItem(SETTINGS_STORAGE_KEY) || "{}");
        } catch (error) {
            return {};
        }
    }

    function saveGameSettings() {
        const settings = readGameSettings();
        const devMode = document.getElementById("devModeToggle").checked;
        window.localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify({
            category: typeof settings.category === "string" ? settings.category : "mixed",
            devMode: devMode
        }));
    }

    function launchGame() {
        saveGameSettings();
        window.location.href = "game.html";
    }

    function showHowToPlay() {
        window.alert(HOW_TO_PLAY_MESSAGE);
    }

    function shuffleList(list) {
        const items = list.slice();

        for (let index = items.length - 1; index > 0; index -= 1) {
            const swapIndex = Math.floor(Math.random() * (index + 1));
            const temp = items[index];
            items[index] = items[swapIndex];
            items[swapIndex] = temp;
        }

        return items;
    }

    function startMenuScene() {
        const runner = document.getElementById("menuRunner");
        const monster = document.getElementById("menuMonster");
        const bubble = document.getElementById("menuRunnerBubble");
        const bubbleText = document.getElementById("menuRunnerBubbleText");
        const birds = Array.from(document.querySelectorAll(".menu-bird"));
        if (!(runner && monster && bubble && bubbleText)) {
            return;
        }

        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const playerFrames = [
            "assets/player_idle.png",
            "assets/player_run.png"
        ];
        const birdFrames = [
            "assets/birdsprite_wingsup.png",
            "assets/birdsprite_wingdown.png"
        ];

        playerFrames.concat(birdFrames).concat(["assets/monster-lava.png", "assets/UI_title.png", "assets/dialogue bubble.png"]).forEach(function (src) {
            const image = new Image();
            image.src = src;
        });

        const chaseState = {
            x: 28,
            direction: 1,
            speed: 162,
            frameIndex: 1,
            frameTimer: 0,
            monsterX: 0,
            lastTime: 0
        };
        const dialogueState = {
            deck: [],
            lastLine: "",
            currentLine: MENU_DIALOGUE_LINES[0],
            lastVisible: false
        };

        const birdStates = birds.map(function (bird, index) {
            return {
                el: bird,
                x: index === 1 ? -160 : window.innerWidth + index * 160,
                y: 38 + index * 26,
                direction: index === 1 ? 1 : -1,
                speed: 44 + index * 12,
                frameIndex: 0,
                frameTimer: index * 45,
                bobSeed: index * 0.85
            };
        });

        function getRunnerMaxX() {
            return Math.max(28, window.innerWidth - (runner.offsetWidth || 140) - 28);
        }

        function positionMenuBubble(runnerX, runnerBob, direction, visible, bubbleLift) {
            const runnerWidth = runner.offsetWidth || 140;
            const bubbleWidth = bubble.offsetWidth || 180;
            const headAnchor = direction === 1 ? 0.38 : 0.62;
            const bubbleTailAnchor = 0.21;
            const anchorX = runnerX + (runnerWidth * headAnchor);
            const bubbleX = Math.max(
                12,
                Math.min(
                    window.innerWidth - bubbleWidth - 12,
                    anchorX - (bubbleWidth * bubbleTailAnchor)
                )
            );

            bubble.style.opacity = visible ? "1" : "0";
            bubble.style.transform = `translate3d(${bubbleX}px, ${runnerBob - 14 - bubbleLift}px, 0) scale(${visible ? 1 : 0.92})`;
        }

        function fitMenuBubbleText(text) {
            const isCompactViewport = window.innerWidth <= 720;
            const baseFontSize = isCompactViewport ? 6.15 : 7.55;
            const minFontSize = isCompactViewport ? 4.45 : 5;
            let fontSize = baseFontSize;
            let lineHeight = fontSize <= 5.2 ? 0.98 : fontSize <= 6.3 ? 1.01 : 1.05;
            let letterSpacing = fontSize <= 5.2 ? "0" : "0.006em";

            bubbleText.textContent = text;
            bubbleText.style.fontSize = `${fontSize}px`;
            bubbleText.style.lineHeight = String(lineHeight);
            bubbleText.style.letterSpacing = letterSpacing;
            bubbleText.style.transform = "scale(1)";

            while (
                fontSize > minFontSize &&
                (bubbleText.scrollHeight > bubbleText.clientHeight || bubbleText.scrollWidth > bubbleText.clientWidth)
            ) {
                fontSize -= 0.25;
                lineHeight = fontSize <= 5.2 ? 0.98 : fontSize <= 6.2 ? 1 : 1.04;
                letterSpacing = fontSize <= 5.2 ? "0" : "0.004em";
                bubbleText.style.fontSize = `${fontSize}px`;
                bubbleText.style.lineHeight = String(lineHeight);
                bubbleText.style.letterSpacing = letterSpacing;
            }

            const widthScale = bubbleText.scrollWidth > bubbleText.clientWidth
                ? bubbleText.clientWidth / bubbleText.scrollWidth
                : 1;
            const heightScale = bubbleText.scrollHeight > bubbleText.clientHeight
                ? bubbleText.clientHeight / bubbleText.scrollHeight
                : 1;
            const contentScale = Math.max(0.74, Math.min(1, widthScale, heightScale));
            bubbleText.style.transform = contentScale < 0.999 ? `scale(${contentScale})` : "scale(1)";
        }

        function nextMenuDialogueLine() {
            if (!dialogueState.deck.length) {
                dialogueState.deck = shuffleList(MENU_DIALOGUE_LINES);

                if (
                    dialogueState.lastLine &&
                    dialogueState.deck.length > 1 &&
                    dialogueState.deck[0] === dialogueState.lastLine
                ) {
                    const first = dialogueState.deck[0];
                    dialogueState.deck[0] = dialogueState.deck[1];
                    dialogueState.deck[1] = first;
                }
            }

            const line = dialogueState.deck.shift();
            dialogueState.lastLine = line;
            dialogueState.currentLine = line;
            fitMenuBubbleText(line);
            return line;
        }

        function positionStaticScene() {
            runner.src = playerFrames[1];
            runner.style.transform = "translate3d(28px, 0, 0) scaleX(1)";
            monster.style.transform = "translate3d(0, 0, 0) scaleX(1)";
            fitMenuBubbleText(dialogueState.currentLine);
            positionMenuBubble(28, 0, 1, true, 0);

            birdStates.forEach(function (birdState, index) {
                const staticX = 44 + index * 132;
                const staticY = 34 + index * 18;
                birdState.el.src = birdFrames[0];
                birdState.el.style.transform = `translate3d(${staticX}px, ${staticY}px, 0) scaleX(${birdState.direction === 1 ? -1 : 1})`;
            });
        }

        function frame(time) {
            if (prefersReducedMotion) {
                positionStaticScene();
                return;
            }

            if (!chaseState.lastTime) {
                chaseState.lastTime = time;
            }

            const delta = Math.min(40, time - chaseState.lastTime);
            chaseState.lastTime = time;
            chaseState.x += chaseState.direction * chaseState.speed * (delta / 1000);

            const runnerMaxX = getRunnerMaxX();
            if (chaseState.x <= 28) {
                chaseState.x = 28;
                chaseState.direction = 1;
            } else if (chaseState.x >= runnerMaxX) {
                chaseState.x = runnerMaxX;
                chaseState.direction = -1;
            }

            chaseState.frameTimer += delta;
            if (chaseState.frameTimer >= 110) {
                chaseState.frameIndex = chaseState.frameIndex === 0 ? 1 : 0;
                runner.src = playerFrames[chaseState.frameIndex];
                chaseState.frameTimer = 0;
            }

            const desiredMonsterX = chaseState.x - (chaseState.direction === 1 ? 120 : -120);
            const clampedMonsterTarget = Math.max(-16, Math.min(window.innerWidth - (monster.offsetWidth || 180) + 16, desiredMonsterX));
            chaseState.monsterX += (clampedMonsterTarget - chaseState.monsterX) * Math.min(1, delta / 170);

            const runnerBob = Math.sin(time / 120) * 3;
            const monsterBob = Math.sin(time / 145 + 0.8) * 4;
            runner.style.transform = `translate3d(${chaseState.x}px, ${runnerBob}px, 0) scaleX(${chaseState.direction === 1 ? 1 : -1})`;
            monster.style.transform = `translate3d(${chaseState.monsterX}px, ${monsterBob}px, 0) scaleX(${chaseState.direction === 1 ? 1 : -1})`;

            const bubbleCycle = 5200;
            const bubbleWindow = 1650;
            const bubblePhase = time % bubbleCycle;
            const bubbleVisible = bubblePhase < bubbleWindow;
            if (bubbleVisible && !dialogueState.lastVisible) {
                nextMenuDialogueLine();
            }

            const bubbleLift = bubbleVisible ? Math.sin((bubblePhase / bubbleWindow) * Math.PI) * 7 : 0;
            positionMenuBubble(chaseState.x, runnerBob, chaseState.direction, bubbleVisible, bubbleLift);
            dialogueState.lastVisible = bubbleVisible;

            birdStates.forEach(function (birdState, index) {
                birdState.x += birdState.direction * birdState.speed * (delta / 1000);
                birdState.frameTimer += delta;

                if (birdState.frameTimer >= 140) {
                    birdState.frameIndex = birdState.frameIndex === 0 ? 1 : 0;
                    birdState.el.src = birdFrames[birdState.frameIndex];
                    birdState.frameTimer = 0;
                }

                const birdWidth = birdState.el.offsetWidth || 84;
                if (birdState.direction === -1 && birdState.x < -birdWidth - 36) {
                    birdState.x = window.innerWidth + 50 + index * 90;
                    birdState.y = 34 + index * 20;
                } else if (birdState.direction === 1 && birdState.x > window.innerWidth + birdWidth + 36) {
                    birdState.x = -birdWidth - 40 - index * 70;
                    birdState.y = 64 + index * 18;
                }

                const birdBob = Math.sin(time / 280 + birdState.bobSeed) * 10;
                const birdScaleX = birdState.direction === 1 ? -1 : 1;
                birdState.el.style.transform = `translate3d(${birdState.x}px, ${birdState.y + birdBob}px, 0) scaleX(${birdScaleX})`;
            });

            window.requestAnimationFrame(frame);
        }

        [runner, monster].concat(birds).forEach(function (element) {
            element.addEventListener("dragstart", function (event) {
                event.preventDefault();
            });
        });

        if (prefersReducedMotion) {
            positionStaticScene();
            return;
        }

        nextMenuDialogueLine();
        window.requestAnimationFrame(frame);
    }

    (function initMenu() {
        const settings = readGameSettings();
        const devModeToggle = document.getElementById("devModeToggle");
        const startGameButton = document.getElementById("startGameButton");
        const howToPlayButton = document.getElementById("howToPlayButton");

        startGameButton.addEventListener("click", launchGame);
        howToPlayButton.addEventListener("click", showHowToPlay);
        devModeToggle.addEventListener("change", saveGameSettings);
        devModeToggle.checked = !!settings.devMode;
        startMenuScene();
    })();
    </script>
</body>
</html>
